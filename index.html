  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nd:rgba(33,29,24,.6);color:#fff;font-size:15px;line-height:1;cursor:pointer;\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:6px;\">\n            <span style=\"font-size:11px;color:#575148;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ item.name }}<\u002Fspan>\n            <button sc-camel-on-click=\"{{ item.onDownload }}\" style=\"flex-shrink:0;border:1px solid #cfc8bd;background:#fff;width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:12px;line-height:1;color:#575148;\">↓<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ noImages }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center;color:#b3aa9a;padding:36px 0 8px;font-size:13px;\">Tap “Add product photos” to begin.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- Bottom action bar -->\n  <div style=\"flex-shrink:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:#f6f4f0;border-top:1px solid #e2ddd4;display:flex;gap:10px;align-items:center;\">\n    <button sc-camel-on-click=\"{{ processAll }}\" style=\"flex:1;border:none;background:#211d18;color:#f6f4f0;font-family:inherit;font-size:15px;font-weight:600;padding:14px 0;border-radius:12px;cursor:pointer;\">{{ processLabel }}<\u002Fbutton>\n    <button sc-camel-on-click=\"{{ downloadAll }}\" style=\"flex-shrink:0;border:1px solid #cfc8bd;background:#fff;color:#211d18;font-family:inherit;font-size:15px;font-weight:600;padding:14px 18px;border-radius:12px;cursor:pointer;\">Save<\u002Fbutton>\n    <sc-if value=\"{{ hasImages }}\" hint-placeholder-val=\"{{ false }}\">\n      <button sc-camel-on-click=\"{{ clearAll }}\" style=\"flex-shrink:0;border:1px solid #e6cfca;background:#fff;color:#b06a5c;font-family:inherit;font-size:18px;line-height:1;padding:0;width:48px;height:48px;border-radius:12px;cursor:pointer;\">⌫<\u002Fbutton>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- Settings bottom sheet -->\n  <div sc-camel-on-click=\"{{ closeSheet }}\" style=\"position:absolute;inset:0;background:rgba(33,29,24,.4);opacity:{{ sheetOverlay }};pointer-events:{{ sheetPointer }};transition:opacity .22s;z-index:30;\"><\u002Fdiv>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;background:#f6f4f0;border-radius:22px 22px 0 0;box-shadow:0 -10px 40px rgba(33,29,24,.18);transform:translateY({{ sheetY }});transition:transform .28s cubic-bezier(.22,1,.36,1);z-index:31;padding:8px 20px calc(24px + env(safe-area-inset-bottom));max-height:82%;overflow-y:auto;\">\n    <div style=\"display:flex;justify-content:center;padding:8px 0 14px;\"><span style=\"width:40px;height:4px;border-radius:4px;background:#d8d1c5;\"><\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n      <span style=\"font-family:'Instrument Serif',serif;font-size:22px;\">Settings<\u002Fspan>\n      <button sc-camel-on-click=\"{{ closeSheet }}\" style=\"border:none;background:#211d18;color:#f6f4f0;font-family:inherit;font-size:14px;font-weight:600;padding:9px 18px;border-radius:9px;cursor:pointer;\">Done<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9a9182;margin-bottom:10px;\">Backdrop<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:22px;\">\n      <button sc-camel-on-click=\"{{ pickGrey }}\" style=\"{{ greyStyle }}\">\n        <span style=\"width:42px;height:42px;border-radius:8px;flex-shrink:0;background:radial-gradient(120% 90% at 50% 20%, #fff 0%, #ededee 55%, #d9d9db 100%);border:1px solid #d8d3ca;\"><\u002Fspan>\n        <span style=\"text-align:left;\"><span style=\"display:block;font-weight:600;font-size:15px;\">Grey sweep<\u002Fspan><span style=\"display:block;font-size:12px;color:#8c8478;\">Classic seamless studio<\u002Fspan><\u002Fspan>\n      <\u002Fbutton>\n      <button sc-camel-on-click=\"{{ pickBeige }}\" style=\"{{ beigeStyle }}\">\n        <span style=\"width:42px;height:42px;border-radius:8px;flex-shrink:0;background:radial-gradient(120% 90% at 50% 20%, #fbf5ec 0%, #efe3d2 55%, #ddccb4 100%);border:1px solid #e0d3bd;\"><\u002Fspan>\n        <span style=\"text-align:left;\"><span style=\"display:block;font-weight:600;font-size:15px;\">Warm beige<\u002Fspan><span style=\"display:block;font-size:12px;color:#8c8478;\">Soft neutral warmth<\u002Fspan><\u002Fspan>\n      <\u002Fbutton>\n      <button sc-camel-on-click=\"{{ pickCustomBtn }}\" style=\"{{ customStyle }}\">\n        <span style=\"width:42px;height:42px;border-radius:8px;flex-shrink:0;background:{{ customSwatchBg }};background-size:cover;background-position:center;border:1px dashed #cabfae;display:flex;align-items:center;justify-content:center;font-size:20px;color:#b7ab97;\">{{ customSwatchGlyph }}<\u002Fspan>\n        <span style=\"text-align:left;\"><span style=\"display:block;font-weight:600;font-size:15px;\">Custom photo<\u002Fspan><span style=\"display:block;font-size:12px;color:#8c8478;\">Your prop / flower-pot set<\u002Fspan><\u002Fspan>\n      <\u002Fbutton>\n      <input ref=\"{{ bgInputRef }}\" type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ onCustomFile }}\" style=\"display:none;\">\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n      <span style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9a9182;\">Padding<\u002Fspan>\n      <span style=\"font-size:13px;font-variant-numeric:tabular-nums;color:#575148;\">{{ paddingLabel }}<\u002Fspan>\n    <\u002Fdiv>\n    <input type=\"range\" min=\"2\" max=\"22\" step=\"1\" value=\"{{ paddingPct }}\" sc-camel-on-input=\"{{ onPadding }}\" style=\"width:100%;accent-color:#211d18;margin-bottom:22px;\">\n\n    <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9a9182;margin-bottom:10px;\">Product anchor<\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-bottom:22px;\">\n      <button sc-camel-on-click=\"{{ pickCenter }}\" style=\"{{ centerStyle }}\">Center<\u002Fbutton>\n      <button sc-camel-on-click=\"{{ pickBottom }}\" style=\"{{ bottomStyle }}\">Bottom<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9a9182;margin-bottom:10px;\">Background removal<\u002Fdiv>\n    <button sc-camel-on-click=\"{{ toggleAuto }}\" style=\"{{ autoStyle }}\">\n      <span style=\"width:34px;height:20px;border-radius:20px;flex-shrink:0;position:relative;background:{{ autoTrack }};\">\n        <span style=\"position:absolute;top:2px;left:{{ autoKnob }};width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;\"><\u002Fspan>\n      <\u002Fspan>\n      <span style=\"text-align:left;font-size:13px;\">Auto-remove real backgrounds<br><span style=\"color:#8c8478;\">Transparent PNGs pass through<\u002Fspan><\u002Fspan>\n    <\u002Fbutton>\n\n    <div style=\"font-size:12px;color:#a49a8a;line-height:1.5;margin-top:20px;padding-top:14px;border-top:1px solid #e6e0d7;\">\n      Output <strong style=\"color:#575148;\">1080 × 1440<\u002Fstrong> JPG · 3:4 portrait, Myntra apparel spec.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Toast / snackbar -->\n  <div style=\"position:absolute;left:16px;right:16px;bottom:96px;z-index:40;display:flex;justify-content:center;transform:translateY({{ toastY }});opacity:{{ toastOpacity }};transition:transform .3s cubic-bezier(.22,1,.36,1),opacity .3s;pointer-events:none;\">\n    <div style=\"background:#211d18;color:#f6f4f0;font-size:13px;font-weight:500;line-height:1.35;padding:12px 18px;border-radius:13px;box-shadow:0 12px 34px rgba(33,29,24,.32);text-align:center;\">{{ toastMsg }}<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}\">\nclass Component extends DCLogic {\n  state = {\n    images: [],\n    backdrop: 'grey',\n    customBgUrl: null,\n    paddingPct: 8,\n    anchor: 'center',\n    auto: true,\n    processing: false,\n    sheet: false,\n  };\n\n  constructor(props) {\n    super(props);\n    this.fileInputRef = React.createRef();\n    this.bgInputRef = React.createRef();\n    this._removeBg = null;\n    this._removeBgTried = false;\n    this._uid = 0;\n  }\n\n  openSheet = () => this.setState({ sheet: true });\n  closeSheet = () => this.setState({ sheet: false });\n\n  showToast(msg) {\n    clearTimeout(this._toastT);\n    this.setState({ toast: msg });\n    this._toastT = setTimeout(() => this.setState({ toast: null }), 3400);\n  }\n\n  pickFiles = () => this.fileInputRef.current && this.fileInputRef.current.click();\n  onFilesPicked = (e) => { this.addFiles(e.target.files); e.target.value = ''; };\n\n  addFiles(fileList) {\n    const files = Array.from(fileList || []).filter(f => f.type.startsWith('image/'));\n    if (!files.length) return;\n    const added = files.map(f => ({\n      id: 'i' + (++this._uid), name: f.name, file: f,\n      src: URL.createObjectURL(f), result: null, busy: false, done: false, status: '',\n    }));\n    this.setState(s => ({ images: [...s.images, ...added] }));\n    this.showToast(`Added ${added.length} photo${added.length > 1 ? 's' : ''} from gallery`);\n  }\n\n  removeImage(id) { this.setState(s => ({ images: s.images.filter(i => i.id !== id) })); }\n  clearAll = () => {\n    if (this.state.processing) return;\n    if (this.state.images.length && !window.confirm('Remove all photos?')) return;\n    this.setState({ images: [] });\n    this.showToast('All photos removed');\n  };\n\n  pickGrey = () => this.setState({ backdrop: 'grey' });\n  pickBeige = () => this.setState({ backdrop: 'beige' });\n  pickCustomBtn = () => {\n    if (this.state.customBgUrl) this.setState({ backdrop: 'custom' });\n    else this.bgInputRef.current && this.bgInputRef.current.click();\n  };\n  onCustomFile = (e) => {\n    const f = e.target.files && e.target.files[0];\n    if (f) this.setState({ customBgUrl: URL.createObjectURL(f), backdrop: 'custom' });\n    e.target.value = '';\n  };\n  onPadding = (e) => this.setState({ paddingPct: +e.target.value });\n  pickCenter = () => this.setState({ anchor: 'center' });\n  pickBottom = () => this.setState({ anchor: 'bottom' });\n  toggleAuto = () => this.setState(s => ({ auto: !s.auto }));\n\n  async ensureRemover() {\n    if (this._removeBg || this._removeBgTried) return this._removeBg;\n    this._removeBgTried = true;\n    try {\n      const mod = await import('https://esm.sh/@imgly/background-removal@1.5.5');\n      this._removeBg = mod.removeBackground || (mod.default && mod.default.removeBackground) || mod.default;\n    } catch (err) { console.warn('bg-removal load failed', err); this._removeBg = null; }\n    return this._removeBg;\n  }\n\n  loadImg(src) {\n    return new Promise((res, rej) => {\n      const im = new Image(); im.crossOrigin = 'anonymous';\n      im.onload = () => res(im); im.onerror = rej; im.src = src;\n    });\n  }\n\n  hasAlpha(img) {\n    const w = Math.min(img.naturalWidth, 400);\n    const h = Math.round(w * img.naturalHeight / img.naturalWidth) || 1;\n    const c = document.createElement('canvas'); c.width = w; c.height = h;\n    const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);\n    const d = ctx.getImageData(0, 0, w, h).data;\n    let t = 0; for (let i = 3; i < d.length; i += 4) if (d[i] < 240) t++;\n    return t > (d.length / 4) * 0.02;\n  }\n\n  trimBounds(img) {\n    const sw = Math.min(img.naturalWidth, 600);\n    const sh = Math.round(sw * img.naturalHeight / img.naturalWidth) || 1;\n    const c = document.createElement('canvas'); c.width = sw; c.height = sh;\n    const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, sw, sh);\n    const d = ctx.getImageData(0, 0, sw, sh).data;\n    let minX = sw, minY = sh, maxX = 0, maxY = 0, found = false;\n    for (let y = 0; y < sh; y++) for (let x = 0; x < sw; x++) {\n      if (d[(y * sw + x) * 4 + 3] > 12) { found = true;\n        if (x < minX) minX = x; if (x > maxX) maxX = x;\n        if (y < minY) minY = y; if (y > maxY) maxY = y; }\n    }\n    const scx = img.naturalWidth / sw, scy = img.naturalHeight / sh;\n    if (!found) return { x: 0, y: 0, w: img.naturalWidth, h: img.naturalHeight };\n    return { x: minX * scx, y: minY * scy, w: (maxX - minX + 1) * scx, h: (maxY - minY + 1) * scy };\n  }\n\n  drawBackdrop(ctx, W, H, customImg) {\n    if (this.state.backdrop === 'custom' && customImg) {\n      const s = Math.max(W / customImg.naturalWidth, H / customImg.naturalHeight);\n      const dw = customImg.naturalWidth * s, dh = customImg.naturalHeight * s;\n      ctx.drawImage(customImg, (W - dw) / 2, (H - dh) / 2, dw, dh); return;\n    }\n    const warm = this.state.backdrop === 'beige';\n    const g = ctx.createLinearGradient(0, 0, 0, H);\n    if (warm) { g.addColorStop(0, '#f7efe3'); g.addColorStop(.55, '#efe2d0'); g.addColorStop(1, '#ddccb2'); }\n    else { g.addColorStop(0, '#f3f3f4'); g.addColorStop(.55, '#eaeaeb'); g.addColorStop(1, '#d7d7d9'); }\n    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);\n    const r = ctx.createRadialGradient(W / 2, H * 0.28, 0, W / 2, H * 0.28, W * 0.9);\n    r.addColorStop(0, warm ? 'rgba(255,251,244,.7)' : 'rgba(255,255,255,.75)');\n    r.addColorStop(1, 'rgba(255,255,255,0)');\n    ctx.fillStyle = r; ctx.fillRect(0, 0, W, H);\n  }\n\n  async composite(cutoutImg, customImg) {\n    const W = 1080, H = 1440;\n    const c = document.createElement('canvas'); c.width = W; c.height = H;\n    const ctx = c.getContext('2d'); ctx.imageSmoothingQuality = 'high';\n    this.drawBackdrop(ctx, W, H, customImg);\n    const pad = this.state.paddingPct / 100;\n    const bb = this.trimBounds(cutoutImg);\n    const availW = W * (1 - 2 * pad), availH = H * (1 - 2 * pad);\n    const scale = Math.min(availW / bb.w, availH / bb.h);\n    const dw = bb.w * scale, dh = bb.h * scale;\n    const dx = (W - dw) / 2;\n    const dy = this.state.anchor === 'bottom' ? H * (1 - pad) - dh : (H - dh) / 2;\n    ctx.drawImage(cutoutImg, bb.x, bb.y, bb.w, bb.h, dx, dy, dw, dh);\n    return new Promise(res => c.toBlob(b => res(b), 'image/jpeg', 0.92));\n  }\n\n  updateImg(id, patch) { this.setState(s => ({ images: s.images.map(i => i.id === id ? { ...i, ...patch } : i) })); }\n\n  async processOne(item, customImg) {\n    this.updateImg(item.id, { busy: true, done: false, status: 'Analyzing…' });\n    try {\n      const orig = await this.loadImg(item.src);\n      let cutout = orig;\n      if (this.state.auto && !this.hasAlpha(orig)) {\n        const remover = await this.ensureRemover();\n        if (remover) {\n          this.updateImg(item.id, { status: 'Removing background…' });\n          const blob = await remover(item.file);\n          cutout = await this.loadImg(URL.createObjectURL(blob));\n        }\n      }\n      this.updateImg(item.id, { status: 'Compositing…' });\n      const blob = await this.composite(cutout, customImg);\n      this.updateImg(item.id, { result: URL.createObjectURL(blob), _blob: blob, busy: false, done: true, status: '' });\n    } catch (err) { console.warn('process failed', err); this.updateImg(item.id, { busy: false, done: false, status: 'Failed' }); }\n  }\n\n  processAll = async () => {\n    if (this.state.processing) return;\n    const customImg = this.state.customBgUrl ? await this.loadImg(this.state.customBgUrl) : null;\n    this.setState({ processing: true });\n    for (const item of this.state.images) {\n      const cur = this.state.images.find(i => i.id === item.id);\n      if (cur) await this.processOne(cur, customImg);\n    }\n    this.setState({ processing: false });\n    const done = this.state.images.filter(i => i.done).length;\n    if (done) this.showToast(`${done} image${done > 1 ? 's' : ''} ready · tap Save to export`);\n  };\n\n  downloadBlob(blob, name) {\n    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name;\n    document.body.appendChild(a); a.click(); a.remove();\n  }\n  outName(name) { return (name || 'image').replace(/\\.[^.]+$/, '') + '_studio.jpg'; }\n  downloadOne(id) {\n    const it = this.state.images.find(i => i.id === id);\n    if (it && it._blob) { this.downloadBlob(it._blob, this.outName(it.name)); this.showToast('Saved to your device · check Downloads / Photos'); }\n  }\n\n  downloadAll = async () => {\n    const ready = this.state.images.filter(i => i._blob);\n    if (!ready.length) { this.showToast('Nothing to save yet — process photos first'); return; }\n    try {\n      const JSZip = (await import('https://esm.sh/jszip@3.10.1')).default;\n      const zip = new JSZip(); const seen = {};\n      ready.forEach(i => { let n = this.outName(i.name);\n        if (seen[n]) n = n.replace(/\\.jpg$/, '_' + (++seen[n]) + '.jpg'); else seen[n] = 1;\n        zip.file(n, i._blob); });\n      const blob = await zip.generateAsync({ type: 'blob' });\n      this.downloadBlob(blob, 'myntra_studio_images.zip');\n      this.showToast(`Saved ${ready.length} image${ready.length > 1 ? 's' : ''} (zip) · check Downloads`);\n    } catch (err) { console.warn('zip failed', err); ready.forEach(i => this.downloadBlob(i._blob, this.outName(i.name))); this.showToast(`Saved ${ready.length} image${ready.length > 1 ? 's' : ''} · check Downloads`); }\n  };\n\n  renderVals() {\n    const s = this.state;\n    const selBtn = 'display:flex;align-items:center;gap:12px;width:100%;text-align:left;font-family:inherit;padding:9px;border-radius:11px;cursor:pointer;';\n    const on = 'border:1.5px solid #211d18;background:#efeae1;';\n    const off = 'border:1.5px solid #e4ded4;background:#fbfaf7;';\n    const seg = (a) => `flex:1;font-family:inherit;font-size:14px;font-weight:600;padding:11px 0;border-radius:10px;cursor:pointer;border:1.5px solid ${a ? '#211d18' : '#e4ded4'};background:${a ? '#211d18' : '#fbfaf7'};color:${a ? '#f6f4f0' : '#575148'};`;\n    const ready = s.images.filter(i => i.done).length;\n    const images = s.images.map(i => ({ ...i, display: i.result || i.src,\n      onRemove: () => this.removeImage(i.id), onDownload: () => this.downloadOne(i.id) }));\n\n    const chip = (a) => `display:flex;align-items:center;gap:7px;flex:1;justify-content:center;font-family:inherit;font-size:13px;font-weight:600;padding:9px 6px;border-radius:11px;cursor:pointer;color:${a ? '#211d18' : '#7a7264'};border:1.5px solid ${a ? '#211d18' : '#e4ded4'};background:${a ? '#efeae1' : '#fbfaf7'};`;\n\n    return {\n      images, multiTrue: true,\n      hasImages: images.length > 0, noImages: images.length === 0,\n      countLabel: images.length ? `${images.length} photo${images.length > 1 ? 's' : ''} · ${ready} ready` : 'No photos yet',\n      toastMsg: s.toast || '', toastY: s.toast ? '0' : '150%', toastOpacity: s.toast ? 1 : 0,\n      chipGrey: chip(s.backdrop === 'grey'), chipBeige: chip(s.backdrop === 'beige'), chipCustom: chip(s.backdrop === 'custom'),\n      processLabel: s.processing ? 'Processing…' : 'Process all',\n      processAll: this.processAll, downloadAll: this.downloadAll, clearAll: this.clearAll,\n\n      openSheet: this.openSheet, closeSheet: this.closeSheet,\n      sheetY: s.sheet ? '0%' : '110%',\n      sheetOverlay: s.sheet ? 1 : 0,\n      sheetPointer: s.sheet ? 'auto' : 'none',\n\n      pickGrey: this.pickGrey, pickBeige: this.pickBeige, pickCustomBtn: this.pickCustomBtn,\n      onCustomFile: this.onCustomFile, bgInputRef: this.bgInputRef,\n      greyStyle: selBtn + (s.backdrop === 'grey' ? on : off),\n      beigeStyle: selBtn + (s.backdrop === 'beige' ? on : off),\n      customStyle: selBtn + (s.backdrop === 'custom' ? on : off),\n      customSwatchBg: s.customBgUrl ? `url(${s.customBgUrl})` : '#f1ece3',\n      customSwatchGlyph: s.customBgUrl ? '' : '+',\n\n      paddingPct: s.paddingPct, paddingLabel: s.paddingPct + '%', onPadding: this.onPadding,\n      pickCenter: this.pickCenter, pickBottom: this.pickBottom,\n      centerStyle: seg(s.anchor === 'center'), bottomStyle: seg(s.anchor === 'bottom'),\n      toggleAuto: this.toggleAuto, autoStyle: selBtn + (s.auto ? on : off),\n      autoTrack: s.auto ? '#211d18' : '#c9c2b6', autoKnob: s.auto ? '16px' : '2px',\n\n      fileInputRef: this.fileInputRef, pickFiles: this.pickFiles, onFilesPicked: this.onFilesPicked,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
